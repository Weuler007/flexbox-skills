<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>flex.box</title>
</head>
<body>
  <!-- título -->
   
  <h1>Skils and experience</h1>
  <!-- container de habilidades e experiências -->
  <div class="flex-container">
  <div class="flex-item html">HTML</div>
  <div class="flex-item css">CSS</div>
  <div class="flex-item js">JavaScript</div>
  <div class="flex-item php">PHP</div>
  <div class="flex-item mysql">MYSQL</div>
  <div class="flex-item laravel">Laravel</div>
  <div class="flex-item bootstrap">Bootstrap</div>
  <div class="flex-item tailwind">Tailwind</div>
  <div class="flex-item git">Git</div>
  <div class="flex-item github">GitHub</div>
</div>

</body>
</html>
